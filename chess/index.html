<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script src="../auth-guard.js"></script>
</head>
<body>

  <!-- Nav bar — menu.js injects into .menu; CPU vs CPU lives in #chess-topbar -->
  <ul class="menu">
    <li><a href="../index.html">Homepage</a></li>
  </ul>
  <div id="chess-topbar">
    <button id="btn-cvc-open">CPU vs CPU</button>
  </div>

  <!-- ══════════════════ LOBBY (time-control grid) ══════════════════ -->
  <div id="chess-lobby">
    <div class="tc-grid" id="tc-grid"></div>
  </div>

  <!-- ══════════════════ BOARD VIEW ══════════════════ -->
  <div id="chess-game" style="display:none">
    <div class="game-layout">

      <!-- Left column: back + board + buttons -->
      <div class="game-left">
        <div class="game-toprow">
          <button class="back-btn" id="btn-back">&#8592; Back</button>
          <span class="opponent-name" id="opponent-name"></span>
        </div>
        <div class="clock-row opponent-clock-row">
          <div class="clock" id="clock-opponent"></div>
        </div>
        <div class="board-wrapper">
          <div class="chess-board" id="chess-board"></div>
        </div>
        <div class="clock-row player-clock-row">
          <div class="clock" id="clock-player"></div>
        </div>
        <div class="player-name-row">
          <span class="player-name" id="player-name">You</span>
        </div>
        <div class="board-action-row">
          <button class="action-btn resign-btn" id="btn-resign" style="display:none">Resign</button>
          <button class="action-btn draw-btn"   id="btn-draw"   style="display:none">Draw?</button>
        </div>
      </div>

      <!-- Right column: move list + status -->
      <div class="game-right">
        <div class="move-list-panel">
          <div class="move-list-header">Moves</div>
          <div class="move-list" id="move-list"></div>
        </div>
        <div class="status-panel">
          <div class="status-turn" id="status-turn">White's turn</div>
          <div class="status-msg"  id="status-msg"></div>
          <div class="status-online" id="status-online" style="display:none"></div>
        </div>
        <div class="captured-area">
          <div class="captured-row">
            <span class="captured-label">White captured:</span>
            <span class="captured-pieces" id="captured-white-pieces"></span>
          </div>
          <div class="captured-row">
            <span class="captured-label">Black captured:</span>
            <span class="captured-pieces" id="captured-black-pieces"></span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════ MODAL OVERLAY ══════════════════ -->
  <div id="modal-overlay" style="display:none">
    <div class="modal-box" id="modal-box">
      <!-- content injected by JS -->
    </div>
  </div>

  <script src="script.js"></script>
  <script src="../menu.js"></script>
</body>
</html>
