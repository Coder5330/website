<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script src="../auth-guard.js"></script>
</head>
<body>
  <ul class="menu">
    <li><a href="../index.html">Homepage</a></li>
  </ul>

  <div class="chess-app">
    <!-- Left sidebar -->
    <div class="chess-sidebar">
      <div class="mode-buttons">
        <button class="mode-btn active" data-mode="pvp-local">
          Player VS Player<br><span class="mode-sub">(local)</span>
        </button>
        <button class="mode-btn" data-mode="pvp-online">
          Player VS Player<br><span class="mode-sub">(online)</span>
        </button>
        <button class="mode-btn" data-mode="pvc-local">
          Player VS Computer<br><span class="mode-sub">(local)</span>
        </button>
        <button class="mode-btn" data-mode="cvc-local">
          Computer VS Computer<br><span class="mode-sub">(local)</span>
        </button>
      </div>

      <!-- Difficulty level selector — shown only in PvC / CvC modes -->
      <div class="level-selector" id="level-selector" style="display:none">
        <div class="level-heading">Difficulty</div>
        <div class="level-buttons" id="level-buttons"></div>
      </div>

      <div class="game-status" id="game-status">
        <div class="status-turn" id="status-turn">White's turn</div>
        <div class="status-msg" id="status-msg"></div>
        <div class="status-online" id="status-online" style="display:none"></div>
      </div>

      <!-- Online mode controls -->
      <div class="online-controls" id="online-controls" style="display:none">
        <button class="online-btn" id="btn-create-game">Create Game</button>
        <div class="online-join">
          <input type="text" id="join-code-input" placeholder="Room code" maxlength="6">
          <button class="online-btn" id="btn-join-game">Join</button>
        </div>
        <div class="room-info" id="room-info"></div>
      </div>

      <!-- CvC stop button -->
      <button class="stop-btn" id="btn-stop-cvc" style="display:none">Stop</button>
    </div>

    <!-- Right: board area -->
    <div class="chess-main">
      <div class="board-wrapper">
        <div class="chess-board" id="chess-board"></div>
      </div>
      <div class="board-controls">
        <button class="new-game-btn" id="btn-new-game">New Game</button>
      </div>
      <div class="captured-area">
        <div class="captured-row" id="captured-white">
          <span class="captured-label">White captured:</span>
          <span class="captured-pieces" id="captured-white-pieces"></span>
        </div>
        <div class="captured-row" id="captured-black">
          <span class="captured-label">Black captured:</span>
          <span class="captured-pieces" id="captured-black-pieces"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="../menu.js"></script>
</body>
</html>
