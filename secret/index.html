<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>??? — Skill Hub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { justify-content: center; align-items: center; min-height: 100vh; }

    /* ── Gate ── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 360px;
      padding: 0 16px;
    }
    .gate-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      color: #ef4444;
    }
    .gate-title {
      font-size: 24px;
      color: #f1f5f9;
      text-align: center;
    }
    .gate-sub {
      font-size: 12px;
      color: #475569;
      text-align: center;
      line-height: 1.6;
    }
    .gate-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e5e7eb;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      letter-spacing: 6px;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
    }
    .gate-input:focus { border-color: rgba(239,68,68,0.5); }
    .gate-btn {
      width: 100%;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px;
      color: #ef4444;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .gate-btn:hover { background: rgba(239,68,68,0.18); }
    .gate-msg {
      font-size: 11px;
      color: #ef4444;
      min-height: 16px;
    }

    /* ── Chat ── */
    #chat { display: none; width: 100%; max-width: 680px; padding: 0 16px 60px; }
    .chat-header {
      margin-bottom: 20px;
    }
    .chat-eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      color: #ef4444;
      margin-bottom: 4px;
    }
    .chat-title { font-size: 20px; color: #f1f5f9; }
    .chat-box {
      background: #131f35;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
      scroll-behavior: smooth;
    }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .msg { display: flex; flex-direction: column; gap: 3px; }
    .msg-meta { display: flex; align-items: baseline; gap: 8px; }
    .msg-name { font-size: 11px; color: #ef4444; letter-spacing: 0.5px; }
    .msg-time { font-size: 10px; color: #334155; }
    .msg-text { font-size: 13px; color: #cbd5e1; line-height: 1.5; word-break: break-word; }
    .msg-mine .msg-name { color: #00f5ff; }
    .chat-empty { color: #334155; font-size: 12px; text-align: center; margin: auto; }
    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      background: #131f35;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e5e7eb;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: rgba(239,68,68,0.3); }
    .chat-send {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #ef4444;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 0 16px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chat-send:hover { background: rgba(239,68,68,0.18); }
    .chat-send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <ul class="menu">
    <li><a href="../index.html">Homepage</a></li>
  </ul>

  <div id="gate">
    <div class="gate-eyebrow">RESTRICTED</div>
    <div class="gate-title">You found it.</div>
    <p class="gate-sub">This room is locked. Your key is 8 digits.<br>You'll have to earn it.</p>
    <input class="gate-input" id="key-input" type="text" maxlength="8" placeholder="········" autocomplete="off">
    <button class="gate-btn" onclick="tryKey()">unlock</button>
    <div class="gate-msg" id="gate-msg"></div>
  </div>

  <div id="chat">
    <div class="chat-header">
      <div class="chat-eyebrow">SECRET ROOM</div>
      <div class="chat-title">You're in.</div>
    </div>
    <div class="chat-box" id="chat-box">
      <div class="chat-empty" id="chat-empty">No messages yet.</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="msg-input" type="text" maxlength="300" placeholder="say something…" autocomplete="off">
      <button class="chat-send" id="send-btn" onclick="sendMsg()">send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
