<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Piano Tiles</title>
<link rel="stylesheet" href="../style.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <ul class="menu">
    <li><a href="../index.html">Homepage</a></li>
    <li><a href="../about/index.html">About</a></li>
  </ul>
  <div id="app">
    <div id="menu" class="screen">
      <h1>Piano Tiles</h1>
      <p class="hint">Press <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> to hit the tiles in each column.<br>Miss a tile and you die.</p>
      <button id="startBtn">Start</button>
      <button id="leaderboardBtn">Leaderboard</button>
      <p class="credit">Music courtesy of <a href="http://www.classicals.de" target="_blank" rel="noopener">classicals.de</a></p>
    </div>
    <div id="game" class="screen hidden">
      <div id="hud">
        <div id="level">⭐</div>
        <div id="score">0</div>
      </div>
      <div id="board">
        <div class="column" data-col="0"></div>
        <div class="column" data-col="1"></div>
        <div class="column" data-col="2"></div>
        <div class="column" data-col="3"></div>
        <div id="hitline"></div>
        <div id="keyHints">
          <span>1</span><span>2</span><span>3</span><span>4</span>
        </div>
      </div>
    </div>
    <div id="gameover" class="screen hidden">
      <h2>Game Over</h2>
      <p>Score: <span id="finalScore">0</span></p>
      <div id="nameEntry">
        <input id="nameInput" type="text" maxlength="12" placeholder="Your name" />
        <button id="saveBtn">Save Score</button>
      </div>
      <div id="postSave" class="hidden">
        <button id="playAgainBtn">Play Again</button>
        <button id="viewBoardBtn">Leaderboard</button>
      </div>
    </div>
    <div id="leaderboard" class="screen hidden">
      <h2>Leaderboard</h2>
      <ol id="scoreList"></ol>
      <button id="backBtn">Back</button>
    </div>
  </div>
  <audio id="music" src="assets/music.mp3" preload="auto" loop></audio>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script src="../auth-guard.js"></script>
  <script src="../menu.js"></script>
  <script src="game.js"></script>
</body>
</html>
