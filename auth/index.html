<!DOCTYPE html>
<html>
<head>
  <title>Login — Skill Hub</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding-top: 0 !important;
    }

    .auth-box {
      background: #131f35;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      color: #00f5ff;
      text-align: center;
    }

    .auth-box h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
      text-align: center;
      margin-bottom: 4px;
    }

    .auth-box p {
      font-size: 12px;
      color: #475569;
      text-align: center;
    }

    .auth-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e5e7eb;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .auth-input:focus {
      border-color: rgba(0,245,255,0.3);
    }

    .auth-input::placeholder {
      color: #334155;
    }

    .auth-btn {
      width: 100%;
      background: rgba(0,245,255,0.1);
      border: 1px solid rgba(0,245,255,0.3);
      border-radius: 8px;
      padding: 10px;
      color: #00f5ff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }

    .auth-btn:hover {
      background: rgba(0,245,255,0.18);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: #334155;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    .auth-toggle {
      font-size: 12px;
      color: #475569;
      text-align: center;
    }

    .auth-toggle span {
      color: #00f5ff;
      cursor: pointer;
    }

    .auth-toggle span:hover {
      text-decoration: underline;
    }

    .auth-msg {
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      color: #F09595;
    }

    .auth-msg.ok {
      color: #5DCAA5;
    }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-eyebrow">SKILL HUB</div>
    <h1 id="auth-title">Welcome back</h1>
    <p id="auth-sub">Log in to save your progress across all challenges.</p>

    <input class="auth-input" type="email" id="email" placeholder="email">
    <input class="auth-input" type="password" id="password" placeholder="password">

    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">log in</button>

    <div class="auth-divider">or</div>

    <div class="auth-toggle" id="auth-toggle">
      No account? <span onclick="toggleMode()">sign up</span>
    </div>

    <div class="auth-msg" id="auth-msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script>
    let mode = 'login'; // or 'signup'

    // If already logged in, go to homepage
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/index.html';
    });

    function toggleMode() {
      mode = mode === 'login' ? 'signup' : 'login';
      if (mode === 'signup') {
        document.getElementById('auth-title').textContent = 'Create account';
        document.getElementById('auth-sub').textContent = 'Sign up to track your scores and progress.';
        document.getElementById('auth-btn').textContent = 'sign up';
        document.getElementById('auth-toggle').innerHTML = 'Already have an account? <span onclick="toggleMode()">log in</span>';
      } else {
        document.getElementById('auth-title').textContent = 'Welcome back';
        document.getElementById('auth-sub').textContent = 'Log in to save your progress across all challenges.';
        document.getElementById('auth-btn').textContent = 'log in';
        document.getElementById('auth-toggle').innerHTML = 'No account? <span onclick="toggleMode()">sign up</span>';
      }
      document.getElementById('auth-msg').textContent = '';
    }

    async function handleAuth() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('auth-msg');
      msg.className = 'auth-msg';
      msg.textContent = mode === 'login' ? 'logging in...' : 'creating account...';

      let error;
      if (mode === 'login') {
        ({ error } = await sb.auth.signInWithPassword({ email, password }));
      } else {
        ({ error } = await sb.auth.signUp({ email, password }));
      }

      if (error) {
        msg.textContent = error.message;
      } else if (mode === 'signup') {
        msg.className = 'auth-msg ok';
        msg.textContent = 'check your email to confirm your account!';
      } else {
        window.location.href = '/index.html';
      }
    }

    // Allow enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAuth();
    });
  </script>
</body>
</html>
