<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../style.css">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="box">
            <h1>CPS Test</h1>
            <p>How fast can you click?</p>
            <div>
                <p id="timer">Timer: 0</p>
                <p id="cps">CPS: 0</p>
                <p id="clicks">Clicks: 0</p>
            </div>
            <div id="canvas">
                <p>Start clicking to start test...</p>
            </div>
        </div>

        <div class="box">
            <h1>Duration</h1>
            <ul>
                <li><button id="s1">1 second</button></li>
                <li><button id="s2">2 seconds</button></li>
                <li><button id="s5">5 seconds</button></li>
                <li><button id="s10" class="chosen">10 seconds</button></li>
                <li><button id="s30">30 seconds</button></li>
                <li><button id="s60">60 seconds</button></li>
                <li><button id="s100">100 seconds</button></li>   
            </ul>
        </div>
        <script src="script.js"></script>
    </body>
</html>
